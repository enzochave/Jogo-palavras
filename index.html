<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo das Palavras</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container">

        <h1>Jogo das Palavras</h1>

        <!-- Tela Inicial -->
        <div id="setup-container">

            <input 
                onkeydown="iniciarJogo(event)"
                type="text"
                id="nickname-input"
                placeholder="Digite seu nickname..."
            >

            <!-- CREDITOS -->
            <p class="creditos">
                Desenvolvido por <span>Enzo Moraiss</span>
            </p>

        </div>

        <!-- Tela do Jogo -->
        <div id="game-container" class="hidden">

            <!-- CREDITOS TOPO -->
            <div class="top-creditos">
                ✨ Desenvolvido por <span>Enzo Moraiss</span>
            </div>

            <h2 id="player-display"></h2>

            <!-- DICA -->
            <p id="hint-display" class="hint"></p>

            <!-- Exibe as letras -->
            <div id="word-display" class="word-slots"></div>

            <!-- Campo letra -->
            <input
                onkeydown="tentarLetra(event)"
                type="text"
                id="letter-input"
                maxlength="1"
                placeholder="Letra"
            >

            <!-- Status -->
            <div class="status-info">
                <p>Erros: <span id="error-count">0</span> / 4</p>
                <p id="game-message"></p>
            </div>

            <button onclick="reiniciarJogo()" id="reset-btn" class="hidden">
                Jogar Novamente
            </button>

        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
